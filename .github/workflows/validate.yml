name: Validate Renovate config

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Validate all preset files
        env:
          # Authenticate preset resolution to avoid GitHub API rate limits
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          files=$(git ls-files '*.json' | grep -v -E '(^|/)(package(-lock)?\.json)$' || true)
          echo "Validating:"
          echo "$files"
          npx --yes --package renovate -- renovate-config-validator --strict $files
