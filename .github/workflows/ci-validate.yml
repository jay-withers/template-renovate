name: ci-validate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: lts/*

      - name: Validate all preset files
        env:
          # Authenticate preset resolution to avoid GitHub API rate limits
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Renovate presets live at the repo root; nested JSON (e.g.
          # .devcontainer/devcontainer.json) is not Renovate config.
          mapfile -t files < <(git ls-files '*.json' | grep -v '/' || true)
          echo "Validating:"
          printf '%s\n' "${files[@]}"
          npx --yes --package renovate -- renovate-config-validator --strict "${files[@]}"
