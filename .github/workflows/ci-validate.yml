name: ci-validate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*

      - name: Validate all preset files
        env:
          # Authenticate preset resolution to avoid GitHub API rate limits
          GITHUB_COM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Renovate presets live at the repo root; nested JSON (e.g.
          # .devcontainer/devcontainer.json) is not Renovate config.
          mapfile -t files < <(git ls-files '*.json' | grep -v '/' || true)
          echo "Validating:"
          printf '%s\n' "${files[@]}"
          npx --yes --package renovate -- renovate-config-validator --strict "${files[@]}"
